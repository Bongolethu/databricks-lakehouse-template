name: "Databricks Asset Bundle & Infra CI/CD (GCP)"

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

# Required by Google OIDC to request the JWT token
permissions:
  contents: read
  id-token: write

jobs:
  ci-pipeline:
    name: "Build, Validate and Test Pipeline"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Install Build Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "Run Local Python Unit Tests"
        run: |
          pytest tests/unit/

      - name: "Install Databricks CLI"
        uses: databricks/setup-cli@v0.2.0

      - name: "Authenticate to Google Cloud via OIDC"
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: "Validate Dev Asset Bundle"
        if: github.ref == 'refs/heads/develop'
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_DEV_HOST }}

      - name: "Validate Prod Asset Bundle"
        if: github.ref == 'refs/heads/main'
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}

  cd-pipeline:
    name: "Deploy Infra and Asset Bundle"
    needs: ci-pipeline
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Install Databricks CLI"
        uses: databricks/setup-cli@v0.2.0

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: "Authenticate to Google Cloud via OIDC"
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ==========================================
      # INFRASTRUCTURE DEPLOYMENT LAYER (TERRAFORM)
      # ==========================================
      - name: "Terraform Apply"
        run: |
          cd infra/terraform
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_gcp_project_id: ${{ vars.TF_VAR_gcp_project_id }}
          TF_VAR_databricks_workspace_host: ${{ vars.TF_VAR_databricks_workspace_host }}
          TF_VAR_databricks_uc_service_account: ${{ vars.TF_VAR_databricks_uc_service_account }}
          TF_VAR_environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

      # ==========================================
      # DATA PLATFORM DEPLOYMENT LAYER (DABs)
      # ==========================================
      - name: "Deploy to Development Workspace"
        if: github.ref == 'refs/heads/develop'
        run: databricks bundle deploy -e development
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_DEV_HOST }}

      - name: "Deploy to Production Workspace"
        if: github.ref == 'refs/heads/main'
        run: databricks bundle deploy -e production
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}