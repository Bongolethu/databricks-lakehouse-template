name: "Databricks Lakehouse & DAB Deployment"

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/business-analyst/📋 USE-CASES/**'
      - 'README.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/business-analyst/📋 USE-CASES/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # STEP 1: CODE QUALITY AND SCHEMA VALIDATION LAYER
  validate:
    name: "Validate Code & DAB Configurations"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "Install Linting Stacks"
        run: pip install ruff pytest

      - name: "Run Code Linter"
        run: ruff check src/

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      - name: "Validate Dev Bundle Integrity"
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_DEV_TOKEN }}

  # STEP 2: STAGING LAYER DEPLOYMENT & PIPELINE TESTING
  deploy-staging:
    name: "Deploy to Staging (Dev Branch)"
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      - name: "Deploy Bundle to Staging Environment"
        run: databricks bundle deploy --target staging
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_STG_TOKEN }}

      - name: "Run Delta Live Tables Pipeline Integration Dry-Run"
        run: databricks bundle run staging_data_pipeline_refresh
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_STG_TOKEN }}

  # STEP 3: BLUEPRINT PRODUCTION RUN (GATEKEEPED BY MAIN MERGE)
  deploy-production:
    name: "Deploy to Production (Main Branch)"
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      - name: "Deploy Bundle to Production Namespace"
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}

      - name: "Enforce Workspace Configuration Alignments"
        run: |
          echo "Applying dynamic column masking/row filters and validating Persona Sync from .databricks/personas/"
          # DevOps/MLOps hooks to update dynamic security models or trigger workflow updates directly