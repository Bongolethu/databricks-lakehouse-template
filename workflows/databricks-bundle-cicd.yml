name: "Databricks Lakehouse & DAB Deployment"

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/business-analyst/📋 USE-CASES/**'
      - 'README.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/business-analyst/📋 USE-CASES/**'
      - 'README.md'
  workflow_dispatch:

# Enforce secure OIDC token generation capabilities at the workflow root
permissions:
  id-token: write
  contents: read

jobs:
  # ==========================================
  # STEP 1: CODE QUALITY & VALIDATION LAYER
  # ==========================================
  validate:
    name: "Validate Code & DAB Configurations"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "Install Linting Stacks"
        run: pip install ruff pytest

      - name: "Run Code Linter"
        run: ruff check src/

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      # Authenticate via OIDC to validate features using the Non-Prod identity context
      - name: "Authenticate to Cloud Provider via OIDC"
        uses: azure/login@v2 # Swap with aws-actions/configure-aws-credentials if on AWS
        with:
          client-id: ${{ secrets.CLOUD_NONPROD_CLIENT_ID }}
          tenant-id: ${{ secrets.CLOUD_TENANT_ID }}
          subscription-id: ${{ secrets.CLOUD_SUBSCRIPTION_ID }}

      - name: "Validate Dev Bundle Integrity"
        run: databricks bundle validate
        env:
          ARM_USE_MSI: true # Informs the runner to utilize ambient federated security contexts
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_DEV_HOST }}

  # ==========================================
  # STEP 2: STAGING LAYER DEPLOYMENT & TESTING
  # ==========================================
  deploy-staging:
    name: "Deploy to Staging (Dev Branch)"
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      - name: "Authenticate to Non-Prod via OIDC"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLOUD_NONPROD_CLIENT_ID }}
          tenant-id: ${{ secrets.CLOUD_TENANT_ID }}
          subscription-id: ${{ secrets.CLOUD_SUBSCRIPTION_ID }}

      - name: "Deploy Bundle to Staging Environment"
        run: databricks bundle deploy --target staging
        env:
          ARM_USE_MSI: true
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}

      - name: "Run Delta Live Tables Pipeline Integration Dry-Run"
        run: databricks bundle run staging_data_pipeline_refresh
        env:
          ARM_USE_MSI: true
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_STG_HOST }}

  # ==========================================
  # STEP 3: LUA-PROTECTED PRODUCTION DEPLOYMENT
  # ==========================================
  deploy-production:
    name: "Deploy to Production (Main Branch)"
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Environment rule forces manual approvals by Tech Leads/Architects in GitHub settings
    environment: production
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Databricks CLI"
        uses: databricks/setup-cli@v1

      - name: "Authenticate to Isolated Prod via OIDC"
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CLOUD_PROD_CLIENT_ID }} # High-privilege production service principal
          tenant-id: ${{ secrets.CLOUD_TENANT_ID }}
          subscription-id: ${{ secrets.CLOUD_SUBSCRIPTION_ID }}

      - name: "Deploy Bundle to Production Namespace"
        run: databricks bundle deploy --target prod
        env:
          ARM_USE_MSI: true
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}

      - name: "Enforce Workspace Configuration Alignments"
        run: |
          echo "DAB update complete. Running access privilege reconciliation."
          echo "Persona structures sync verified against active active-directory metadata models."