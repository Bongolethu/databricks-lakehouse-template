name: Deploy Databricks Lakehouse

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Authenticate using GitHub Variables
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

    # 2. Set up Cloud SDK using GitHub Variable
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        project_id: ${{ vars.GCP_PROJECT_ID }}

    # 3. Install Terraform
    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    # 4. Terraform Initialization
    - name: 'Terraform Init'
      run: terraform init -reconfigure

    # 5. Terraform Plan (Mapping Secrets to TF Variables)
    - name: 'Terraform Plan'
      env:
        TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
        TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      run: terraform plan -input=false

    # 6. Terraform Apply
    - name: 'Terraform Apply'
      env:
        TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID }}
        TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      run: terraform apply -auto-approve -input=false
