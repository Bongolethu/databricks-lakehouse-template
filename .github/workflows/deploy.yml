name: Deploy Databricks Lakehouse

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    # --- ADDED WORKING DIRECTORY HERE ---
    defaults:
      run:
        working-directory: src/infra/terraform # <-- CHANGE THIS to your path (e.g., ./terraform)
    # ------------------------------------
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Authenticate to Google Cloud
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v2'
      with:
        workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || 'projects/884945754396/locations/global/workloadIdentityPools/github-pool/providers/github-provider' }}
        service_account: ${{ vars.GCP_SERVICE_ACCOUNT || 'github-deployer@bongo-143414.iam.gserviceaccount.com' }}

    # 2. Set up Cloud SDK
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        version: '>= 363.0.0'
        project_id: ${{ vars.GCP_PROJECT_ID || 'bongo-143414' }}

    # 3. Install Terraform
    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    # 4. Terraform Initialization
    - name: 'Terraform Init'
      run: terraform init -reconfigure

    # 5. Terraform Plan
    - name: 'Terraform Plan'
      env:
        TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID || 'bongo-143414' }}
        TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      run: terraform plan -input=false

    # 6. Terraform Apply
    - name: 'Terraform Apply'
      env:
        TF_VAR_gcp_project_id: ${{ vars.GCP_PROJECT_ID || 'bongo-143414' }}
        TF_VAR_databricks_account_id: ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      run: terraform apply -auto-approve -input=false
