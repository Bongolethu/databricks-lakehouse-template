name: "Terraform PR Validation"

on:
  pull_request:
    branches:
      - main
    paths:
      - "infra/terraform/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write # Required to comment the plan output on the PR

jobs:
  validate-and-plan:
    name: "Terraform Format, Validate & Plan"
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the feature branch code
      - name: "Checkout Code"
        uses: actions/checkout@v4

      # Step 2: Install Terraform CLI
      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      # Step 3: Check code formatting
      - name: "Terraform Format Check"
        run: |
          cd infra/terraform
          terraform fmt -check

      # Step 4: Authenticate to GCP via OIDC
      - name: "Authenticate to GCP via OIDC"
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Step 5: Initialize Backend & Validate Configuration
      - name: "Terraform Init & Validate"
        run: |
          cd infra/terraform
          terraform init
          terraform validate
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: "us-central1"
          TF_VAR_databricks_workspace_host: ${{ secrets.DATABRICKS_DEV_HOST }}
          TF_VAR_databricks_uc_service_account: ${{ secrets.DATABRICKS_DEV_UC_SA }}

      # Step 6: Generate Terraform Plan
      - name: "Terraform Plan"
        id: plan
        run: |
          cd infra/terraform
          terraform plan -no-color -out=tfplan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: "us-central1"
          TF_VAR_databricks_workspace_host: ${{ secrets.DATABRICKS_DEV_HOST }}
          TF_VAR_databricks_uc_service_account: ${{ secrets.DATABRICKS_DEV_UC_SA }}

      # Step 7: Post the Plan output as a PR Comment
      - name: "Post Plan to Pull Request"
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const execSync = require('child_process').execSync;
            const planOutput = execSync('cd infra/terraform && terraform show -no-color tfplan').toString();
            
            // Truncate if output is too long for GitHub comments (max ~65k chars)
            const maxLen = 60000;
            const truncatedPlan = planOutput.length > maxLen 
              ? planOutput.substring(0, maxLen) + '\n... [Output Truncated]' 
              : planOutput;

            const body = `#### Terraform Plan Status: 🖌
            
            <details><summary>Show Execution Plan</summary>

            \`\`\`hcl
            ${truncatedPlan}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });